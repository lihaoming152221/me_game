<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D第三人称俯视射击生存游戏</title>
    <style>
        /* ... 样式保持不变 ... */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #ui > div {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #gameOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 20;
            color: white;
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.4s;
        }
        #gameOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #gameOverlay h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 30px #00aaff;
            letter-spacing: 4px;
        }
        #gameOverlay h2 {
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0 0 20px 0;
            color: #ffdd44;
        }
        #gameOverlay p {
            font-size: 1.2rem;
            max-width: 400px;
            margin: 10px auto;
            line-height: 1.6;
            color: #ccc;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 14px 44px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: #00aaff;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,170,255,0.4);
            pointer-events: auto;
            letter-spacing: 2px;
            min-width: 160px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,170,255,0.7);
        }
        .btn.secondary {
            background: #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .btn.secondary:hover {
            background: #666;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }
        .btn.danger {
            background: #ff4444;
            box-shadow: 0 4px 20px rgba(255,68,68,0.4);
        }
        .btn.danger:hover {
            background: #ff6666;
            box-shadow: 0 8px 30px rgba(255,68,68,0.7);
        }
        #healthBar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 18px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.3);
            overflow: hidden;
            z-index: 10;
            backdrop-filter: blur(2px);
        }
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #44ff44);
            transition: width 0.15s;
            border-radius: 30px;
        }
        #controlsHint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            #gameOverlay h1 { font-size: 2.8rem; }
            #gameOverlay h2 { font-size: 1.6rem; }
            .btn { padding: 12px 28px; font-size: 1.2rem; min-width: 120px; }
            #healthBar { width: 200px; height: 14px; }
            #ui > div { font-size: 14px; padding: 4px 12px; }
        }
    </style>
</head>
<body>

    <!-- UI 显示 -->
    <div id="ui">
        <div>⏱️ 生存时间: <span id="timerDisplay">00:00</span></div>
        <div>🎯 击杀: <span id="killDisplay">0</span></div>
    </div>

    <!-- 血条 -->
    <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    <div id="controlsHint">WASD 移动 | 鼠标瞄准 | 左键射击</div>

    <!-- 覆盖层（开始/继续/结束） -->
    <div id="gameOverlay">
        <h1>⚔️ 生存射击</h1>
        <h2 id="statusTitle">准备开始</h2>
        <p id="statusDesc">消灭敌人，生存下去！<br>每击败一个敌人增加生命值。</p>
        <div class="btn-group">
            <button id="mainActionBtn" class="btn">开始游戏</button>
            <button id="resetBtn" class="btn secondary">重新开始</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x112233);
        scene.fog = new THREE.Fog(0x112233, 20, 50);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 18, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        dirLight.position.set(10, 25, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 25;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 40;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x446688, 0.6);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        // 地面
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a4a5a, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // 网格辅助线
        const gridHelper = new THREE.GridHelper(40, 20, 0x88ccff, 0x336699);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);

        // 边界装饰
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 });
        const wallPositions = [[-20, 0, 0], [20, 0, 0], [0, 0, -20], [0, 0, 20]];
        wallPositions.forEach(pos => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 40), wallMat);
            wall.position.set(pos[0], 1, pos[2]);
            scene.add(wall);
        });

        // --- 游戏状态 ---
        const state = {
            isPlaying: false,
            isGameOver: false,
            score: 0,
            survivalTime: 0,
            health: 100,
            maxHealth: 100,
            enemies: [],
            bullets: [],
            player: null,
            clock: new THREE.Clock(),
            spawnTimer: 0,
            spawnInterval: 2.5,
            enemySpeed: 2.5,
            lastTimestamp: 0,
        };

        // --- DOM 元素 ---
        const timerDisplay = document.getElementById('timerDisplay');
        const killDisplay = document.getElementById('killDisplay');
        const healthFill = document.getElementById('healthFill');
        const overlay = document.getElementById('gameOverlay');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const resetBtn = document.getElementById('resetBtn');

        // --- 玩家 (修复方向) ---
        function createPlayer() {
            const group = new THREE.Group();

            // 身体
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, roughness: 0.4, metalness: 0.1 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 1.2, 8), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            // 头部
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.3 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 8), headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            group.add(head);

            // 枪 (指向Z正方向，即前方)
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.7 });
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), gunMat);
            gun.position.set(0.5, 0.7, 0.8);
            gun.castShadow = true;
            group.add(gun);

            // 枪管
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0x666666 }));
            barrel.rotation.x = Math.PI/2;
            barrel.position.set(0.5, 0.7, 1.2);
            group.add(barrel);

            // 眼睛 (小点) - 朝向Z正方向
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6), eyeMat);
            eye1.position.set(-0.2, 1.5, 0.4);
            group.add(eye1);
            const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6), eyeMat);
            eye2.position.set(0.2, 1.5, 0.4);
            group.add(eye2);

            group.position.set(0, 0, 0);
            return group;
        }

        // --- 敌人 ---
        function createEnemy() {
            const group = new THREE.Group();
            const color = 0xff5555;
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.9, 6), mat);
            body.position.y = 0.45;
            body.castShadow = true;
            group.add(body);

            const headMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 6), headMat);
            head.position.y = 1.05;
            head.castShadow = true;
            group.add(head);

            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6), eyeMat);
            eye1.position.set(-0.15, 1.15, 0.3);
            group.add(eye1);
            const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6), eyeMat);
            eye2.position.set(0.15, 1.15, 0.3);
            group.add(eye2);

            const angle = Math.random() * Math.PI * 2;
            const radius = 8 + Math.random() * 10;
            group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            
            group.rotation.y = Math.random() * Math.PI * 2;

            return group;
        }

        // --- 子弹 ---
        function createBullet(position, direction) {
            const bulletMat = new THREE.MeshStandardMaterial({ 
                color: 0xffdd44, 
                emissive: 0xff8800,
                emissiveIntensity: 0.5
            });
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6), bulletMat);
            bullet.position.copy(position);
            bullet.position.y += 0.6;
            bullet.castShadow = true;
            bullet.userData.velocity = direction.clone().multiplyScalar(30);
            bullet.userData.life = 2.5;
            return bullet;
        }

        // --- 游戏对象初始化 ---
        let player = createPlayer();
        scene.add(player);
        state.player = player;

        // 相机跟随
        function updateCamera() {
            const pos = player.position;
            const offset = new THREE.Vector3(0, 14, 14);
            camera.position.copy(pos.clone().add(offset));
            camera.lookAt(pos.x, 0, pos.z);
        }
        updateCamera();

        // --- 事件监听 ---
        const keys = { w: false, a: false, s: false, d: false };
        let mouseX = 0, mouseY = 0;

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') keys[key] = true;
            if (key === ' ' && state.isPlaying && !state.isGameOver) {
                e.preventDefault();
                shoot();
            }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') keys[key] = false;
        });

        // 鼠标移动控制视角
        document.addEventListener('mousemove', (e) => {
            if (!state.isPlaying || state.isGameOver) return;
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            // 玩家旋转 - 现在使用鼠标控制
            const angle = mouseX * Math.PI * 0.6;
            player.rotation.y = angle;
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0 && state.isPlaying && !state.isGameOver) {
                shoot();
            }
        });

        // --- 修复射击方向 ---
        function shoot() {
            if (!state.isPlaying || state.isGameOver) return;
            
            // 获取玩家的朝向（Z轴正方向为前方）
            const forward = new THREE.Vector3(0, 0, 1);
            forward.applyQuaternion(player.quaternion);
            forward.normalize();
            
            // 子弹起始位置（从枪口位置发射）
            const startPos = player.position.clone();
            startPos.y += 0.8;
            // 稍微向前偏移
            startPos.add(forward.clone().multiplyScalar(0.8));
            
            const bullet = createBullet(startPos, forward);
            scene.add(bullet);
            state.bullets.push(bullet);
        }

        // --- 游戏逻辑函数 ---
        function spawnEnemy() {
            if (!state.isPlaying || state.isGameOver) return;
            const enemy = createEnemy();
            scene.add(enemy);
            state.enemies.push(enemy);
        }

        function updateEnemies(delta) {
            const speed = state.enemySpeed;
            const playerPos = state.player.position;

            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const enemy = state.enemies[i];
                const dir = new THREE.Vector3().copy(playerPos).sub(enemy.position);
                dir.y = 0;
                const dist = dir.length();
                if (dist > 0.5) {
                    dir.normalize();
                    enemy.position.add(dir.multiplyScalar(speed * delta));
                }
                const angle = Math.atan2(dir.x, dir.z);
                enemy.rotation.y = angle;

                if (dist < 1.2) {
                    state.health -= 15;
                    if (state.health < 0) state.health = 0;
                    updateHealthUI();
                    scene.remove(enemy);
                    state.enemies.splice(i, 1);
                    if (state.health <= 0) {
                        gameOver();
                    }
                    continue;
                }

                for (let j = state.bullets.length - 1; j >= 0; j--) {
                    const bullet = state.bullets[j];
                    const bPos = bullet.position;
                    const ePos = enemy.position;
                    const dx = bPos.x - ePos.x;
                    const dz = bPos.z - ePos.z;
                    if (dx*dx + dz*dz < 1.0 && Math.abs(bPos.y - ePos.y) < 1.0) {
                        scene.remove(bullet);
                        state.bullets.splice(j, 1);
                        scene.remove(enemy);
                        state.enemies.splice(i, 1);
                        state.score += 1;
                        killDisplay.textContent = state.score;
                        state.health = Math.min(state.maxHealth, state.health + 8);
                        updateHealthUI();
                        break;
                    }
                }
            }
        }

        function updateBullets(delta) {
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const bullet = state.bullets[i];
                bullet.position.add(bullet.userData.velocity.clone().multiplyScalar(delta));
                bullet.userData.life -= delta;
                if (bullet.userData.life <= 0 || Math.abs(bullet.position.x) > 22 || Math.abs(bullet.position.z) > 22) {
                    scene.remove(bullet);
                    state.bullets.splice(i, 1);
                }
            }
        }

        function updateHealthUI() {
            const pct = Math.max(0, state.health / state.maxHealth * 100);
            healthFill.style.width = pct + '%';
            if (pct < 30) healthFill.style.background = 'linear-gradient(90deg, #ff4444, #ff8844)';
            else healthFill.style.background = 'linear-gradient(90deg, #44ff44, #88ff44)';
        }

        function gameOver() {
            state.isPlaying = false;
            state.isGameOver = true;
            overlay.classList.remove('hidden');
            statusTitle.textContent = '💀 你死了';
            statusDesc.textContent = `生存时间: ${formatTime(state.survivalTime)}  击杀: ${state.score}`;
            mainActionBtn.textContent = '🔄 继续游戏';
            mainActionBtn.className = 'btn secondary';
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function resetGame() {
            state.enemies.forEach(e => scene.remove(e));
            state.enemies = [];
            state.bullets.forEach(b => scene.remove(b));
            state.bullets = [];
            state.score = 0;
            state.survivalTime = 0;
            state.health = state.maxHealth;
            state.isGameOver = false;
            state.isPlaying = false;
            state.spawnTimer = 0;
            killDisplay.textContent = '0';
            timerDisplay.textContent = '00:00';
            updateHealthUI();
            player.position.set(0, 0, 0);
            updateCamera();
            overlay.classList.remove('hidden');
            statusTitle.textContent = '🔄 重新开始';
            statusDesc.textContent = '准备迎接新的挑战！';
            mainActionBtn.textContent = '开始游戏';
            mainActionBtn.className = 'btn';
        }

        function startGame() {
            if (state.isGameOver) {
                resetGame();
                setTimeout(() => startGame(), 50);
                return;
            }
            state.isPlaying = true;
            state.isGameOver = false;
            state.clock.start();
            state.lastTimestamp = performance.now();
            overlay.classList.add('hidden');
            mainActionBtn.textContent = '继续游戏';
            mainActionBtn.className = 'btn secondary';
            for (let i=0; i<4; i++) spawnEnemy();
        }

        // --- UI按钮事件 ---
        mainActionBtn.addEventListener('click', () => {
            if (state.isGameOver) {
                resetGame();
                setTimeout(() => startGame(), 100);
            } else if (!state.isPlaying) {
                startGame();
            }
        });

        resetBtn.addEventListener('click', () => {
            resetGame();
        });

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 游戏循环 ---
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = Math.min(0.05, (now - state.lastTimestamp) / 1000);
            state.lastTimestamp = now;

            if (state.isPlaying && !state.isGameOver) {
                state.survivalTime += delta;
                timerDisplay.textContent = formatTime(state.survivalTime);

                // 玩家移动
                const moveSpeed = 5.5;
                const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);
                const moveDir = new THREE.Vector3(0, 0, 0);
                if (keys.w) moveDir.add(forward);
                if (keys.s) moveDir.sub(forward);
                if (keys.a) moveDir.sub(right);
                if (keys.d) moveDir.add(right);
                if (moveDir.length() > 0) {
                    moveDir.normalize().multiplyScalar(moveSpeed * delta);
                    player.position.add(moveDir);
                    const limit = 18;
                    player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
                    player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
                }

                updateCamera();

                state.spawnTimer += delta;
                if (state.spawnTimer >= state.spawnInterval) {
                    state.spawnTimer = 0;
                    spawnEnemy();
                    if (state.survivalTime > 30) state.spawnInterval = 1.8;
                    if (state.survivalTime > 60) state.spawnInterval = 1.2;
                    if (state.survivalTime > 120) state.spawnInterval = 0.8;
                    state.enemySpeed = 2.5 + state.survivalTime * 0.02;
                }

                updateEnemies(delta);
                updateBullets(delta);

                if (state.health <= 0) {
                    state.health = 0;
                    updateHealthUI();
                    gameOver();
                }
            }

            renderer.render(scene, camera);
        }

        // 初始状态
        resetGame();
        animate();

        console.log('🎮 3D第三人称俯视射击生存游戏已启动！');
        console.log('WASD移动 | 鼠标旋转视角 | 左键/空格射击');
    </script>
</body>
</html>
